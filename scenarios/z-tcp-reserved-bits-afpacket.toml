schema_version = "celatim.scenario.v1"
scenario_id = "tcp-reserved-bits-afpacket-netns"
mechanism_id = "tcp-reserved-bits"
description = "Privileged TCP reserved-bit scenario using netns/veth, AF_PACKET, and tcpdump."
evidence_tier = "real_pdu_packet_path"
privilege = "root"
expected_runtime_s = 5.0
requires_tools = ["ip", "tcpdump"]
requires_extras = []
payload_hex = "00 ff 80 54 43 50"
control_message = "control"

[pacing]
unit_rate_hz = 20.0
timing_quantum_s = 0.005

[transport]
kind = "afpacket_ipv4"
sender_interface = "vs"
receiver_interface = "vr"
src_mac = "02:00:00:00:00:01"
dst_mac = "02:00:00:00:00:02"
src_ip = "10.10.0.1"
dst_ip = "10.10.0.2"
src_port = 40000
dst_port = 443
protocol = "tcp"
timeout_s = 10.0
capture_pcap = "../out/pcaps/{scenario_id}-{case}.pcap"
capture_namespace = "rcv"
capture_interface = "vr"
capture_filter = ["tcp", "port", "443"]
capture_snaplen = 65535
capture_require_output = true
