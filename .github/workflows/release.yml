name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release distributions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          version: "0.10.0"

      - name: Verify release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY

      - name: Run release quality gates
        run: make ci

      - name: Build release distributions
        run: uv build --out-dir dist

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Validate wheel contents
        run: uvx check-wheel-contents dist/*.whl

      - name: Require PEP 639 license metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = archive.namelist()
              metadata_name = next(name for name in names if name.endswith(".dist-info/METADATA"))
              metadata = archive.read(metadata_name).decode()
          if "License-Expression:" not in metadata:
              raise SystemExit("missing PEP 639 License-Expression metadata")
          if not any(".dist-info/licenses/" in name for name in names):
              raise SystemExit("missing packaged license file")
          PY

      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified distributions
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/celatim
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
